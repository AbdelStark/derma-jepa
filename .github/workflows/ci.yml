name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fixture-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy
      - name: Unit tests
        run: uv run pytest
      - name: Fixture pipeline
        run: uv run derma-jepa fixture pipeline --config configs/manifest/fixture.yaml
