# EXP-003 HAM10000 primary-tier config — held-out nuisance family.
#
# Differences from configs/data/ham10000_hf_mounted_exp002.yaml:
#
# - dataset.nuisance_severity_eval = "strong_held_out"
#     Training stable pairs are generated under the "strong" family
#     (brightness/contrast/saturation/rotation/flip/scale/translate/
#     gaussian-blur/gaussian-noise/mid-quality-JPEG). Validation and
#     test stable pairs are generated under a disjoint family
#     (hue shift / posterize / sharpen / motion blur / random erasing /
#     low-quality JPEG). The two families share no transform type. This
#     tests whether the JEPA-style predictor's EXP-002 win survives an
#     augmentation distribution it has never seen at training time.
#
# Everything else mirrors EXP-002: strict same-diagnosis-site changing
# pairs, 1000 pairs per split, seed 20260422, DINOv2 ViT-S/14 + ViT-B/14.

run_id: ham10000-hf-dinov2-primary-exp003-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:
  nuisance_severity: strong
  nuisance_severity_eval: strong_held_out
  changing_pair_policy: strict_same_diagnosis_site

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dinov2_vits14
      kind: dinov2
      model_name: facebook/dinov2-small
      batch_size: 32
      device: auto
    - model_id: dinov2_vitb14
      kind: dinov2
      model_name: facebook/dinov2-base
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_exp003_v1
  embedding_model_id: dinov2_vitb14
  epochs: 200
  batch_size: 128
  learning_rate: 0.03
  weight_decay: 0.001
