# HAM10000 config for Hugging Face Jobs runs that mount the dataset at /data.
#
# Launch via:
#   HF_JOBS_VOLUME="hf://datasets/<namespace>/<ham10000-repo>:/data:ro" \
#   DERMA_JEPA_CONFIG_PATH=configs/data/ham10000_hf_mounted.yaml \
#   HF_JOBS_FLAVOR=a100-large \
#   HF_JOBS_TIMEOUT=12h \
#   ./scripts/hf_jobs_train_bundle.sh
#
# The mounted dataset repo must contain HAM10000_metadata.csv and the two
# image parts at the paths below. No raw patient images live in this repo.
# The run remains research-only and is not a diagnostic workflow.

run_id: ham10000-hf-dinov2-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dinov2_vits14
      kind: dinov2
      model_name: facebook/dinov2-small
      batch_size: 32
      device: auto
    - model_id: dinov2_vitb14
      kind: dinov2
      model_name: facebook/dinov2-base
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_v1
  embedding_model_id: dinov2_vitb14
  epochs: 200
  batch_size: 128
  learning_rate: 0.03
  weight_decay: 0.001
