# EXP-005 HAM10000 primary-tier config — MLP predictor on the EXP-004
# proxy (mixed-family training + third-family held-out eval).
#
# Differences from configs/data/ham10000_hf_mounted_exp004.yaml:
#
# - training.predictor = "mlp"
#     2-layer MLP with identity residual (y = x + W2 relu(W1 x + b1) + b2),
#     initialised so the starting function is identity (W2 = 0, b2 = 0,
#     W1 small random). Same optimiser, same LR, same weight decay, same
#     epoch count as the linear predictor. Only the function class
#     changes.
#
# - training.hidden_dim = 512
#     Compact width; the objective is to test whether a non-linear
#     predictor generalises to unseen nuisance families, not to maximise
#     capacity.
#
# Everything else mirrors EXP-004 so the measured delta is a clean read
# on predictor-class bottleneck vs backbone bottleneck. See
# docs/experiments/EXP-004-ham10000-jepa-mixed-train-held-out-2-v1.md §7.

run_id: ham10000-hf-dinov2-primary-exp005-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:
  nuisance_severity: "strong,strong_held_out"
  nuisance_severity_eval: strong_held_out_2
  changing_pair_policy: strict_same_diagnosis_site

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dinov2_vits14
      kind: dinov2
      model_name: facebook/dinov2-small
      batch_size: 32
      device: auto
    - model_id: dinov2_vitb14
      kind: dinov2
      model_name: facebook/dinov2-base
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_exp005_v1
  embedding_model_id: dinov2_vitb14
  epochs: 200
  batch_size: 128
  learning_rate: 0.03
  weight_decay: 0.001
  predictor: mlp
  hidden_dim: 512
