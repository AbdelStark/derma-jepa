# EXP-006a HAM10000 primary-tier config — MLP predictor with Adam
# optimiser on the EXP-004 proxy. Follow-up to EXP-005, which found the
# MLP under SGD + weight-decay-toward-zero stayed pinned to its identity
# initialisation. Adam's per-parameter adaptive rates should escape the
# zero-W2 attractor and let the MLP actually fit the training mixture.
#
# Differences from configs/data/ham10000_hf_mounted_exp005.yaml:
#
# - training.optimizer = "adam"
# - training.learning_rate = 0.001 (Adam-typical; SGD's 0.03 is too high)
# - training.weight_decay = 0.0001 (Adam-typical)
#
# Everything else identical to EXP-005 so the delta is purely a read on
# MLP training configuration.

run_id: ham10000-hf-dinov2-primary-exp006a-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:
  nuisance_severity: "strong,strong_held_out"
  nuisance_severity_eval: strong_held_out_2
  changing_pair_policy: strict_same_diagnosis_site

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dinov2_vits14
      kind: dinov2
      model_name: facebook/dinov2-small
      batch_size: 32
      device: auto
    - model_id: dinov2_vitb14
      kind: dinov2
      model_name: facebook/dinov2-base
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_exp006a_v1
  embedding_model_id: dinov2_vitb14
  epochs: 200
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  predictor: mlp
  hidden_dim: 512
  optimizer: adam
