# EXP-006b HAM10000 primary-tier config — CLIP ViT-B/16 backbone swap
# on the EXP-004 proxy. If the generalisation collapse and below-random
# inversion observed under frozen DINOv2 also reproduces under CLIP,
# the bottleneck is a general property of frozen web-scale vision
# backbones on this nuisance family. If CLIP behaves differently, the
# failure is DINOv2-specific.
#
# Differences from configs/data/ham10000_hf_mounted_exp004.yaml:
#
# - embeddings.models replaced with OpenAI CLIP ViT-B/16 via
#   transformers (model_name: openai/clip-vit-base-patch16,
#   kind: clip).
# - training.embedding_model_id now points at the CLIP backbone.
# - training.model_id renamed for provenance.
#
# Predictor class is kept linear (EXP-002/003/004 scaffold) so the only
# changed variable is the frozen backbone.

run_id: ham10000-hf-clip-primary-exp006b-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:
  nuisance_severity: "strong,strong_held_out"
  nuisance_severity_eval: strong_held_out_2
  changing_pair_policy: strict_same_diagnosis_site

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: clip_vitb16
      kind: clip
      model_name: openai/clip-vit-base-patch16
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_exp006b_v1
  embedding_model_id: clip_vitb16
  epochs: 200
  batch_size: 128
  learning_rate: 0.03
  weight_decay: 0.001
  predictor: linear
  hidden_dim: 512
  optimizer: sgd
