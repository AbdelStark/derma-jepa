# EXP-007 HAM10000 primary-tier config — DermLIP (dermoscopy-CLIP)
# backbone swap on the EXP-004 proxy. Tests whether a vision encoder
# pretrained on ~1M dermatology image-text pairs (Derm1M) moves the
# below-random inversion observed under frozen DINOv2 (EXP-004/005/006a)
# and frozen web-pretrained OpenAI CLIP (EXP-006b) on strong_held_out_2.
#
# Model: redlessone/DermLIP_ViT-B-16 — OpenAI CLIP ViT-B/16 architecture
# CLIP-trained on Derm1M. 224×224 input, 512-d projected image
# embedding. Licence CC-BY-NC 4.0 (research only). Loaded via open_clip
# through the hf-hub: prefix.
#
# Rationale for picking this DermLIP variant over DermLIP_PanDerm-base-
# w-PubMed-256: the two share Derm1M supervision but DermLIP_PanDerm
# uses a PanDerm-pretrained vision tower with an older open_clip config
# schema (pretrain_path key) that fails to load on open_clip 3.3.0. The
# OpenAI-CLIP-backbone variant loads cleanly AND gives an exact
# architecture match to EXP-006b, so EXP-006b vs EXP-007 isolates the
# pretraining-data change (web-scale captions → dermatology captions)
# on identical ViT-B/16 weights at identical input size.
#
# Pretraining-contamination caveat: Derm1M almost certainly includes
# HAM10000 raw images. The evaluation here still depends on synthetic
# strong_held_out_2 nuisance augmentations that the backbone has never
# seen, so image-level overlap does not directly leak the label; write
# this up explicitly in the EXP-007 report.
#
# Differences from configs/data/ham10000_hf_mounted_exp006b.yaml:
#
# - embeddings.models replaced with DermLIP via open_clip
#   (kind: open_clip, model_name: hf-hub:redlessone/DermLIP_ViT-B-16).
# - training.embedding_model_id now points at the DermLIP backbone.
# - training.model_id renamed for provenance.
#
# Predictor class is kept linear (EXP-002/003/004/006b scaffold) so the
# only changed variable is the frozen backbone.

run_id: ham10000-hf-dermlip-primary-exp007-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 1000
  changing_pairs_per_split: 1000
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records:
  nuisance_severity: "strong,strong_held_out"
  nuisance_severity_eval: strong_held_out_2
  changing_pair_policy: strict_same_diagnosis_site

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 1000
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dermlip_b16
      kind: open_clip
      model_name: hf-hub:redlessone/DermLIP_ViT-B-16
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_exp007_v1
  embedding_model_id: dermlip_b16
  epochs: 200
  batch_size: 128
  learning_rate: 0.03
  weight_decay: 0.001
  predictor: linear
  hidden_dim: 512
  optimizer: sgd
