# HAM10000 smoke config for Hugging Face Jobs.
#
# Same mount layout as configs/data/ham10000_hf_mounted.yaml but truncated for
# a cheap first hosted run on real data. Use this to validate the dataset
# mount, the DINOv2 install, and the end-to-end wiring before spending the
# full training budget.
#
# Launch via:
#   HF_JOBS_VOLUME="hf://datasets/<namespace>/<ham10000-repo>:/data:ro" \
#   DERMA_JEPA_CONFIG_PATH=configs/data/ham10000_hf_mounted_smoke.yaml \
#   DERMA_JEPA_INSTALL_EXTRAS=model \
#   HF_JOBS_FLAVOR=a10g-small \
#   HF_JOBS_TIMEOUT=1h \
#   ./scripts/hf_jobs_train_bundle.sh
#
# Research-only. Not diagnostic and not validated for patient use.

run_id: ham10000-hf-dinov2-smoke-v1
output_root: outputs/runs
artifact_root: outputs/artifacts/demo
seed: 20260422

dataset:
  kind: ham10000
  name: ham10000
  metadata_csv: /data/HAM10000_metadata.csv
  image_roots:
    - /data/HAM10000_images_part_1
    - /data/HAM10000_images_part_2
    - /data/images
  image_extensions:
    - jpg
    - jpeg
    - png
  stable_pairs_per_split: 100
  changing_pairs_per_split: 100
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  max_records: 2000

preprocessing:
  profile: ham10000_224_center_crop_v1
  image_size: 224

metrics:
  bootstrap_samples: 200
  ci_level: 0.95
  fixed_tpr: 0.80

embeddings:
  models:
    - model_id: dinov2_vits14
      kind: dinov2
      model_name: facebook/dinov2-small
      batch_size: 16
      device: auto

training:
  model_id: jepa_predictor_ham10000_smoke_v1
  embedding_model_id: dinov2_vits14
  epochs: 20
  batch_size: 64
  learning_rate: 0.03
  weight_decay: 0.001
